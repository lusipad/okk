name: OKK Desktop Windows Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      artifact_base: ${{ steps.package_meta.outputs.artifact_base }}
      desktop_version: ${{ steps.package_meta.outputs.desktop_version }}
      commit_short: ${{ steps.package_meta.outputs.commit_short }}
      zip_name: ${{ steps.package_meta.outputs.zip_name }}
      checksum_name: ${{ steps.package_meta.outputs.checksum_name }}
      release_notes_name: ${{ steps.package_meta.outputs.release_notes_name }}
      release_title: ${{ steps.package_meta.outputs.release_title }}
      sha256: ${{ steps.checksums.outputs.sha256 }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify desktop tests
        run: npm run test -w @okk/desktop

      - name: Compute package metadata
        id: package_meta
        shell: pwsh
        run: |
          $rawRef = "${{ github.ref_name }}"
          $safeRef = ($rawRef -replace '[^A-Za-z0-9._-]', '-').Trim('-')
          if ([string]::IsNullOrWhiteSpace($safeRef)) {
            $safeRef = "manual"
          }
          $desktopVersion = node -p "require('./packages/desktop/package.json').version"
          $commitShort = "${{ github.sha }}".Substring(0, 7)
          $artifactBase = "OKK-Desktop-windows-x64-$safeRef"
          "artifact_base=$artifactBase" >> $env:GITHUB_OUTPUT
          "desktop_version=$desktopVersion" >> $env:GITHUB_OUTPUT
          "commit_short=$commitShort" >> $env:GITHUB_OUTPUT
          "zip_name=$artifactBase.zip" >> $env:GITHUB_OUTPUT
          "checksum_name=$artifactBase.sha256.txt" >> $env:GITHUB_OUTPUT
          "release_notes_name=$artifactBase-release-notes.md" >> $env:GITHUB_OUTPUT
          "release_title=OKK Desktop $rawRef" >> $env:GITHUB_OUTPUT

      - name: Build and package Windows desktop app (with retry)
        shell: pwsh
        run: |
          $attempts = 3
          for ($i = 1; $i -le $attempts; $i++) {
            Write-Host "Package attempt $i/$attempts"
            npm run package:win -w @okk/desktop
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($i -eq $attempts) {
              exit $LASTEXITCODE
            }
            Start-Sleep -Seconds (10 * $i)
          }

      - name: Run packaged desktop smoke
        shell: pwsh
        run: |
          node scripts/desktop-smoke.mjs --mode packaged --entry packages/desktop/release/win-unpacked/OKK.exe --outputDir packages/desktop/release/desktop-smoke

      - name: Create distributable zip from win-unpacked
        shell: pwsh
        run: |
          $releaseDir = "packages/desktop/release"
          $unpackedDir = Join-Path $releaseDir "win-unpacked"
          if (-not (Test-Path $unpackedDir)) {
            throw "win-unpacked directory not found: $unpackedDir"
          }
          $zipPath = Join-Path $releaseDir "${{ steps.package_meta.outputs.zip_name }}"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "$unpackedDir/*" -DestinationPath $zipPath

      - name: Generate checksums
        id: checksums
        shell: pwsh
        run: |
          $releaseDir = "packages/desktop/release"
          $zipPath = Join-Path $releaseDir "${{ steps.package_meta.outputs.zip_name }}"
          if (-not (Test-Path $zipPath)) {
            throw "Zip artifact not found: $zipPath"
          }
          $checksumPath = Join-Path $releaseDir "${{ steps.package_meta.outputs.checksum_name }}"
          $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ steps.package_meta.outputs.zip_name }}" | Set-Content -Path $checksumPath -Encoding ascii
          "sha256=$hash" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        shell: pwsh
        run: |
          $releaseDir = "packages/desktop/release"
          $notesPath = Join-Path $releaseDir "${{ steps.package_meta.outputs.release_notes_name }}"
          $lines = @(
            '# OKK Desktop Windows Build',
            '',
            '## Build Metadata',
            '',
            '- Product: `OKK Desktop`',
            '- Version: `${{ steps.package_meta.outputs.desktop_version }}`',
            '- Ref: `${{ github.ref_name }}`',
            '- Commit: `${{ github.sha }}` (`${{ steps.package_meta.outputs.commit_short }}`)',
            '- Runner OS: `windows-latest`',
            '- Node.js: `22`',
            '',
            '## Included Files',
            '',
            '- `${{ steps.package_meta.outputs.zip_name }}`',
            '- `${{ steps.package_meta.outputs.checksum_name }}`',
            '',
            '## Verification',
            '',
            '- SHA256: `${{ steps.checksums.outputs.sha256 }}`',
            '- Desktop tests: `npm run test -w @okk/desktop`',
            '- Packaging command: `npm run package:win -w @okk/desktop`',
            '- Packaged smoke: `node scripts/desktop-smoke.mjs --mode packaged --entry packages/desktop/release/win-unpacked/OKK.exe`',
            '',
            '## Usage',
            '',
            '1. Download `${{ steps.package_meta.outputs.zip_name }}`.',
            '2. Verify the hash with `${{ steps.package_meta.outputs.checksum_name }}`.',
            '3. Unzip the package.',
            '4. Run `OKK.exe` from the extracted folder.',
            '',
            '## Notes',
            '',
            '- This workflow packages the Windows desktop app from `packages/desktop/release/win-unpacked/` and republishes it as a distributable zip.',
            '- The raw `win-unpacked` directory is not uploaded as the external delivery artifact.'
          )
          Set-Content -Path $notesPath -Value $lines -Encoding utf8

      - name: Publish job summary
        shell: pwsh
        run: |
          $summaryLines = @(
            '# OKK Desktop Windows Package',
            '',
            '- Artifact: `${{ steps.package_meta.outputs.zip_name }}`',
            '- Checksum file: `${{ steps.package_meta.outputs.checksum_name }}`',
            '- Release notes: `${{ steps.package_meta.outputs.release_notes_name }}`',
            '- Version: `${{ steps.package_meta.outputs.desktop_version }}`',
            '- Ref: `${{ github.ref_name }}`',
            '- Commit: `${{ steps.package_meta.outputs.commit_short }}`',
            '- SHA256: `${{ steps.checksums.outputs.sha256 }}`'
          )
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summaryLines

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_meta.outputs.artifact_base }}
          path: |
            packages/desktop/release/${{ steps.package_meta.outputs.zip_name }}
            packages/desktop/release/${{ steps.package_meta.outputs.checksum_name }}
            packages/desktop/release/${{ steps.package_meta.outputs.release_notes_name }}
            packages/desktop/release/desktop-smoke/**
          if-no-files-found: error
          retention-days: 14

  publish-release:
    needs: package-windows
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: okk-desktop-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package-windows.outputs.artifact_base }}
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.package-windows.outputs.release_title }}
          tag_name: ${{ github.ref_name }}
          body_path: release-artifacts/${{ needs.package-windows.outputs.release_notes_name }}
          files: |
            release-artifacts/${{ needs.package-windows.outputs.zip_name }}
            release-artifacts/${{ needs.package-windows.outputs.checksum_name }}
            release-artifacts/${{ needs.package-windows.outputs.release_notes_name }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
